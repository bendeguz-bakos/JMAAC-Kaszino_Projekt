<input type="text" id="nev">
<input type="password" id="pswd">

<button onclick="loginer()">login</button>

<a href="landingpage.html">AS</a>
<script>
    async function loginer() {
        const felhnev = document.getElementById("nev").value;
        const felhjelsz = document.getElementById("pswd").value;

        const res = await fetch("http://localhost:3000/users");
        const felhasznalok = await res.json();

        const user = felhasznalok.find(u => u.username === felhnev && u.password === felhjelsz);

        if (user) {
            localStorage.setItem("currentUserId", user.id)
            alert("sikeres bejelentkezes")
        } else {
            alert("Hibás felhasználónév vagy jelszó!");
        }

    }
</script>
}
